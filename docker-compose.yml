version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/documents:/app/documents
      - ./backend/chroma_db:/app/chroma_db
      - ./backend/enterprise_rag.db:/app/enterprise_rag.db
    environment:
      - HOST=0.0.0.0
    restart: always

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      - backend
    restart: always
