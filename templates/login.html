<!DOCTYPE html>
<html>

<head>

<title>Login - Enterprise Knowledge AI</title>

<style>

body{
font-family:"Segoe UI",sans-serif;
background:#0f172a;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.card{
background:#020617;
padding:40px;
width:350px;
border-radius:10px;
border:1px solid #1e293b;
text-align:center;
}

h2{
color:#38bdf8;
}

input{
width:90%;
padding:10px;
margin-top:15px;
background:#0f172a;
border:1px solid #334155;
border-radius:6px;
color:white;
}

button{
margin-top:20px;
padding:10px;
width:95%;
border:none;
background:#22c55e;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

a{
color:#38bdf8;
text-decoration:none;
}

</style>

</head>

<body>

<div class="card">

<h2>Login</h2>

<form method="post">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<p>Don't have an account?</p>

<a href="/signup">Create Account</a>

</div>

</body>

</html>
