<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      background: url("/static/images/doc-login1.png") no-repeat center center/cover;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(139, 132, 197, 0.18), rgba(139, 92, 246, 0.58));
      z-index: 0;
    }

    .login-box {
      position: relative;
      z-index: 1;
      width: 350px;
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(15px);
      background: rgba(241, 241, 241, 0.92);
      border: 1px solid rgb(64, 49, 174);
      box-shadow: 0 20px 40px rgb(0 0 0);
      text-align: center;
    }

    .login-box h2 {
      color: rgb(34, 29, 79);
      margin-bottom: 20px;
      font-weight: 600;
    }

    .flash-messages {
      margin-bottom: 12px;
      text-align: left;
      font-size: 13px;
    }

    .flash {
      padding: 8px 10px;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .flash.error {
      background: rgba(229, 62, 62, 0.16);
      color: #9b1c1c;
    }

    .flash.success {
      background: rgba(16, 185, 129, 0.15);
      color: #065f46;
    }

    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    .input-group input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 30px;
      border: none;
      outline: none;
      background: rgba(91, 81, 126, 0.26);
      color: rgb(37, 26, 81);
      font-size: 14px;
    }

    .input-group input::placeholder {
      color: #251a51;
    }

    .input-group input:focus {
      box-shadow: 0 0 10px rgba(25, 28, 90, 0.6);
    }

    .error {
      margin-top: -8px;
      margin-bottom: 10px;
      text-align: left;
      color: #e53e3e;
      font-size: 13px;
      min-height: 18px;
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      border-radius: 30px;
      border: none;
      background: linear-gradient(90deg, #7f53ac 0%, #647dee 100%);
      color: #fff;
      font-size: 16px;
      font-weight: 500;
      margin-top: 6px;
      cursor: pointer;
      transition: 0.3s;
    }

    .login-btn:hover {
      background: linear-gradient(90deg, #647dee 0%, #7f53ac 100%);
      transform: translateY(-2px);
    }

    .loading {
      margin-top: 10px;
      color: #4f46e5;
      font-size: 13px;
      display: none;
    }

    .bottom-text {
      margin-top: 20px;
      font-size: 14px;
      color: #251a51;
    }

    .bottom-text a {
      color: #4f46e5;
      text-decoration: none;
    }

    .bottom-text a:hover {
      text-decoration: underline;
    }

    @media (max-width: 500px) {
      .login-box {
        width: 95vw;
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Login</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-messages">
          {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form id="login-form" method="POST" action="{{ url_for('auth.login') }}" autocomplete="off">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="input-group">
        <input type="text" placeholder="Username" name="username" id="username" required>
      </div>
      <div class="error" id="username-error"></div>

      <div class="input-group">
        <input type="password" placeholder="Password" name="password" id="password" required>
      </div>
      <div class="error" id="password-error"></div>

      <button class="login-btn" id="login-btn" type="submit">Login</button>
      <div class="loading" id="login-loading">Loading...</div>

      <div class="bottom-text">
        Don't have an account? <a href="/register">Register</a>
      </div>
    </form>
  </div>

  <script>
    document.getElementById('login-form').onsubmit = function(e) {
      let valid = true;
      document.getElementById('username-error').innerText = '';
      document.getElementById('password-error').innerText = '';

      const username = document.getElementById('username');
      const password = document.getElementById('password');

      if (!username.value.trim()) {
        document.getElementById('username-error').innerText = 'Username is required.';
        valid = false;
      }

      if (!password.value.trim()) {
        document.getElementById('password-error').innerText = 'Password is required.';
        valid = false;
      }

      if (!valid) {
        e.preventDefault();
        return;
      }

      document.getElementById('login-btn').disabled = true;
      document.getElementById('login-loading').style.display = 'block';
    };
  </script>
</body>
</html>
