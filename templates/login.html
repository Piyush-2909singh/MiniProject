<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DocShashtra_AI</title>


    <style>
        
        body{
            font-family:"Segoe UI", sans-serif;
            background:#0f172a;
            margin:0;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            color:white;
        }


        .card{
            background:#020617;
            padding:40px;
            border-radius:10px;
            border:1px solid #1e293b;
            box-shadow:0 4px 8px rgba(0,0,0,0.2);
            width:350px;
            text-align:center;
        }


        h2{
            color:#38bdf8;
        }


        input{
            width:90%;
            padding:10px;
            margin-top:15px;
            background:#0f172a;
            border:1px solid #334155;
            border-radius:6px;
            color:white;

        }

        button{
            margin-top:20px;
            padding:10px;
            width:17%;
            border:none;
            background:#22c553;
            color:white;
            border-radius:6px;
            cursor:pointer;
        }



        button:hover{
            background:#16a34a;
        }


        a{
            color:#38bdf8;
            text-decoration:none;
        }
        




    </style>

</head>
<body>

    <div class="card">
        <h2>Login</h2>
        <form action="/login" method="post">
            <input type="text" name="username" placeholder="Username" required>
            <br>
            <input type="password" name="password" placeholder="Password" required>
            <br>
            <br>
            <button type="submit">Login</button>
        </form>

        <p>Don't have an account?</p> 
        <a href="/signup">Create Account</a>
    </div>
    
</body>
</html>
