<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">



<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  flex-direction: column;

  background: url("/static/images/ask.png") no-repeat center center/cover;
  position: relative;
  color: white;
}

body::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(15, 23, 42, 0.85);
  z-index: 0;
}


.navbar {
  position: relative;
  z-index: 2;
  padding: 20px 40px;
  display: flex;
  justify-content: space-between;
}

.navbar a {
  color: white;
  text-decoration: none;
}


.container {
  position: relative;
  z-index: 2;
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

.panel {
  width: 500px;
  padding: 40px;
  border-radius: 20px;

  background: rgba(20, 30, 60, 0.6);
  backdrop-filter: blur(15px);

  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);

  text-align: center;
}

input{
margin-top:20px;
width:100%;
padding:12px;
border-radius:8px;
border:1.5px solid #a259ec;
background:rgba(44,20,54,0.95);
color:#f3e8ff;
font-size:1.1em;
transition:border 0.2s;
}
input:focus{
outline:none;
border:2px solid #d291fa;
}

button{
margin-top:20px;
padding:12px 24px;
background:linear-gradient(90deg,#a259ec 0%,#6d28d9 100%);
border:none;
border-radius:8px;
color:white;
font-weight:bold;
font-size:1.1em;
box-shadow:0 2px 8px 0 rgba(162,89,236,0.15);
cursor:pointer;
transition:background 0.2s, box-shadow 0.2s;
}
button:hover{
background:linear-gradient(90deg,#6d28d9 0%,#a259ec 100%);
box-shadow:0 4px 16px 0 rgba(162,89,236,0.25);
}

</style>

</head>

<body>

<div class="container">

<h1>Admin Panel</h1>

<form action="/upload" method="post" enctype="multipart/form-data">

<input type="file" name="file">

<br>

<button type="submit">Upload PDF</button>

</form>

</div>
