<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  flex-direction: column;

  background: url("/static/images/ask.png") no-repeat center center/cover;
  position: relative;
  color: white;
}

/* Overlay */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(15, 23, 42, 0.85);
  z-index: 0;
}

/* Navbar */
.navbar {
  position: relative;
  z-index: 2;
  padding: 20px 40px;
  display: flex;
  justify-content: space-between;
}

.navbar a {
  color: white;
  text-decoration: none;
}

/* Center Container */
.container {
  position: relative;
  z-index: 2;
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Glass Panel */
.panel {
  width: 500px;
  padding: 40px;
  border-radius: 20px;

  background: rgba(20, 30, 60, 0.6);
  backdrop-filter: blur(15px);

  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);

  text-align: center;
}

.panel h2 {
  margin-bottom: 25px;
}

/* File Input */
.file-box {
  margin-bottom: 20px;
}

input[type="file"] {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
}

/* Button */
button {
  padding: 12px 30px;
  border-radius: 25px;
  border: none;
  background: #6366f1;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: translateY(-2px);
}

/* Status box */
.status {
  margin-top: 20px;
  font-size: 14px;
  color: #cbd5f5;
}

.flash-list {
  margin-top: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.flash {
  padding: 10px 12px;
  border-radius: 12px;
  font-size: 13px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(15, 23, 42, 0.6);
}

.flash.success {
  color: #86efac;
  border-color: rgba(16, 185, 129, 0.4);
  background: rgba(16, 185, 129, 0.12);
}

.flash.error {
  color: #fecaca;
  border-color: rgba(239, 68, 68, 0.4);
  background: rgba(239, 68, 68, 0.12);
}

.cta-row {
  margin-top: 18px;
  display: flex;
  justify-content: center;
}

.cta-link {
  display: inline-block;
  padding: 10px 22px;
  border-radius: 999px;
  background: rgba(255,255,255,0.12);
  color: #e0e7ff;
  text-decoration: none;
  border: 1px solid rgba(255,255,255,0.18);
  transition: transform 0.2s, background 0.2s;
}

.cta-link:hover {
  transform: translateY(-2px);
  background: rgba(255,255,255,0.18);
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div>Admin Panel</div>
  <div>
    <a href="/">Home</a> |
    <a href="/logout">Logout</a>
  </div>
</div>

<!-- MAIN -->
<div class="container">
  <div class="panel">

    <h2>Upload Documents</h2>


    <form id="upload-form" method="POST" enctype="multipart/form-data">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="file-box">
        <input type="file" name="file" id="file">
      </div>
      <div class="error" id="file-error" style="color:#e53e3e;font-size:13px;"></div>
      <button type="submit">Upload PDF</button>
      <div class="loading" id="upload-loading" style="display:none;color:#4f46e5;font-size:13px;">Uploading...</div>
    </form>
    {% with messages = get_flashed_messages(with_categories=True) %}
      {% if messages %}
        <div class="flash-list">
          {% for category, message in messages %}
            <div class="flash {{ category|e }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    <script>
    document.getElementById('upload-form').onsubmit = function(e) {
      let file = document.getElementById('file').files[0];
      document.getElementById('file-error').innerText = '';
      if (!file || !file.name.endsWith('.pdf')) {
        document.getElementById('file-error').innerText = 'Please select a PDF file';
        e.preventDefault();
      } else {
        document.getElementById('upload-loading').style.display = 'block';
      }
    };
    </script>

    <div class="status">
      Upload your documents to update the knowledge base.
    </div>

    <div class="cta-row">
      <a class="cta-link" href="/chat">Ask questions</a>
    </div>

  </div>
</div>

</body>
</html>
