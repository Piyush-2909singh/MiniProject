<!DOCTYPE html>
<html>

<head>

<title>Admin Panel</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg, #2d133b 0%, #3a1c4a 50%, #1a0823 100%);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.container{
background:rgba(58,28,74,0.98);
padding:40px;
border-radius:18px;
width:350px;
box-shadow:0 20px 40px 0 rgba(60,16,83,0.4);
border:1.5px solid #a259ec;
text-align:center;
}

input{
margin-top:20px;
width:100%;
padding:12px;
border-radius:8px;
border:1.5px solid #a259ec;
background:rgba(44,20,54,0.95);
color:#f3e8ff;
font-size:1.1em;
transition:border 0.2s;
}
input:focus{
outline:none;
border:2px solid #d291fa;
}

button{
margin-top:20px;
padding:12px 24px;
background:linear-gradient(90deg,#a259ec 0%,#6d28d9 100%);
border:none;
border-radius:8px;
color:white;
font-weight:bold;
font-size:1.1em;
box-shadow:0 2px 8px 0 rgba(162,89,236,0.15);
cursor:pointer;
transition:background 0.2s, box-shadow 0.2s;
}
button:hover{
background:linear-gradient(90deg,#6d28d9 0%,#a259ec 100%);
box-shadow:0 4px 16px 0 rgba(162,89,236,0.25);
}

</style>

</head>

<body>

<div class="container">

<h1>Admin Panel</h1>

<form action="/upload" method="post" enctype="multipart/form-data">

<input type="file" name="file">

<br>

<button type="submit">Upload PDF</button>

</form>

</div>

</html>
