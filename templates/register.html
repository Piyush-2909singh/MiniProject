<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg, #2d133b 0%, #3a1c4a 50%, #1a0823 100%);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.container{
background:rgba(58,28,74,0.98);
padding:40px;
border-radius:18px;
width:320px;
box-shadow:0 20px 40px 0 rgba(60,16,83,0.4);
border:1.5px solid #a259ec;
text-align:center;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:1.5px solid #a259ec;
background:rgba(44,20,54,0.95);
color:#f3e8ff;
font-size:1.1em;
margin-bottom:15px;
transition:border 0.2s;
}
input:focus{
outline:none;
border:2px solid #d291fa;
}

button{
width:100%;
padding:12px;
background:linear-gradient(90deg,#a259ec 0%,#6d28d9 100%);
border:none;
border-radius:8px;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
box-shadow:0 2px 8px 0 rgba(162,89,236,0.15);
transition:background 0.2s, box-shadow 0.2s;
}
button:hover{
background:linear-gradient(90deg,#6d28d9 0%,#a259ec 100%);
box-shadow:0 4px 16px 0 rgba(162,89,236,0.25);
}

a{
color:#a259ec;
text-decoration:none;
font-weight:bold;
}
a:hover{
color:#d291fa;
}

</style>

</head>

<body>

<div class="container">

<h2>Register</h2>

<form method="POST">

<input name="username" placeholder="username" required>

<input type="password" name="password" placeholder="password" required>

<button type="submit">Register</button>

</form>

<br>

<a href="/login">Login</a>

</div>


<!-- fix(ui): fix mobile navigation (3) -->
</body>
</html>
