<!DOCTYPE html>
<html>

<head>

<title>Enterprise Knowledge AI</title>

<style>

body{
    font-family:"Segoe UI",sans-serif;
    background:#0f172a;
    margin:0;
    color:white;
}

/* Header */

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 40px;
    background:#020617;
    border-bottom:1px solid #1e293b;
}

.header h1{
    color:#38bdf8;
    margin:0;
}

.logout-btn{
    background:#22c55e;
    border:none;
    padding:8px 16px;
    border-radius:6px;
    color:white;
    cursor:pointer;
}

/* Main layout */

.container{
    width:70%;
    margin:60px auto;
}

/* AI cards */

.card{
    background:#020617;
    padding:30px;
    border-radius:10px;
    margin-bottom:25px;
    border:1px solid #1e293b;
}

/* Titles */

.card h2{
    margin-top:0;
    color:#38bdf8;
}

/* Inputs */

input[type="file"],
input[type="text"]{
    width:80%;
    padding:10px;
    margin-top:15px;
    border-radius:6px;
    border:1px solid #334155;
    background:#0f172a;
    color:white;
}

/* Buttons */

button{
    margin-top:18px;
    padding:10px 22px;
    border:none;
    background:#22c55e;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}

/* Answer area */

.answer-box{
    margin-top:20px;
    padding:15px;
    background:#0f172a;
    border-left:4px solid #22c55e;
}

</style>

</head>

<body>

<div class="header">

<h1>Enterprise Knowledge AI</h1>

<a href="/logout">
<button class="logout-btn">Logout</button>
</a>

</div>

<div class="container">

<!-- Upload Section -->

<div class="card">

<h2>Upload Knowledge Document</h2>

<form action="/upload" method="post" enctype="multipart/form-data">

<input type="file" name="pdf">

<br>

<button type="submit">Upload PDF</button>

</form>

</div>

<!-- Ask Question Section -->

<div class="card">

<h2>Ask Question From Document</h2>

<form action="/ask" method="post">

<input type="text" name="question" placeholder="Ask something from the document...">

<br>

<button type="submit">Generate Answer</button>

</form>

<div class="answer-box">

<p>AI generated answer will appear here.</p>

</div>

</div>

</div>

</body>

</html>
