<!DOCTYPE html>
<html>

<head>

<title>Enterprise Knowledge Assistant</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#0f172a,#020617);
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:700px;
    background:#0f172a;
    padding:40px;
    border-radius:14px;
    box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.input-area{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:12px;
    border-radius:8px;
    border:none;
    font-size:16px;
}

button{
    padding:12px 20px;
    background:#2563eb;
    border:none;
    border-radius:8px;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1d4ed8;
}

.answer-box{
    margin-top:25px;
    background:#020617;
    padding:20px;
    border-radius:10px;
}

#answer{
    margin-bottom:15px;
    line-height:1.5;
}

#sources{
    font-size:14px;
    color:#9ca3af;
}

</style>

<script>

async function ask(){

let q=document.getElementById("query").value

let res=await fetch("/ask",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({query:q})

})

let data=await res.json()

document.getElementById("answer").innerText=data.answer

document.getElementById("sources").innerText ="Sources: " + data.sources.join(", ")

}

</script>

</head>

<body>

<div class="container">

<h1>Enterprise Knowledge Assistant</h1>

<div class="input-area">
<input id="query" placeholder="Ask question">
<button onclick="ask()">Ask</button>
</div>

<div class="answer-box">
<p id="answer"></p>
<p id="sources"></p>
</div>

</div>

<!-- style(ui): smooth transitions (23) -->

<!-- fix(ui): resolve overflow issues (32) -->
</body>

</html>
