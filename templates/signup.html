<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    
    <style>

        body{
            font-family:"Segoe UI",sans-serif;
            background:#0f172a;
            margin:0;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            color:white;
        }

        .card{
            background:#020617;
            padding:40px;
            width:380px;
            border-radius:10px;
            border:1px solid #1e293b;
        }

        h2{
            text-align:center;
            color:#38bdf8;
        }

        input,select{
            width:90%;
            padding:10px;
            margin-top:12px;
            background:#0f172a;
            border:1px solid #334155;
            border-radius:6px;
            color:white;
        }

        button{
            margin-top:20px;
            width:95%;
            padding:10px;
            background:#22c55e;
            border:none;
            border-radius:6px;
            color:white;
            cursor:pointer;
        }

        button:hover{
            background:#16a34a;
        }

        a{
            color:#38bdf8;
            text-decoration:none;
        }

        .footer{
            text-align:center;
            margin-top:10px;
        }

    </style>



</head>
<body>


    <div class="card">
    <h2>Create Account</h2>

    <form method="post">
        <input type="text" name="name" placeholder="Full Name">
        <br>
        <input type="text" name="username" placeholder="Username">
        <br>

        <input type="password" id="password" name="password" placeholder="Password (max 6 characters)" required>
        <br>
        <select name="designation">

        <option value="">Select Designation</option>
        <option>Student</option>
        <option>Working Professional</option>
        <option>Researcher</option>
        <option>Other</option>


        </select>
        <br>
        <br>
        <button type="submit">Create Account</button>

        </form>

        <div class="footer">
        <p>Already have an account?</p>
        <a href="/login">Login</a>

        </div>

    </div>



    
</body>
</html>
