<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* {
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}


body {
  margin: 0;
  background: url("/static/images/ask.png") no-repeat center center/cover;
  position: relative;
  color: white;
  min-height: 100vh;
}

body::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(15,23,42,0.85);
  z-index: 0;
}

.navbar {
  position: relative;
  z-index: 2;
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
  background: rgba(30,41,59,0.7);
  backdrop-filter: blur(10px);
  border-bottom: 1.5px solid rgba(255,255,255,0.08);
}


.nav-brand {
  font-weight: 600;
  font-size: 1.2em;
}

.nav-links a,
.username {
  color: #e0e7ff;
  margin-left: 18px;
  text-decoration: none;
  font-weight: 500;
}

.status-badge {
  margin-left: 18px;
  padding: 5px 10px;
  border-radius: 999px;
  font-size: 0.8em;
  font-weight: 600;
  border: 1px solid rgba(255,255,255,0.2);
}

.status-ready {
  background: rgba(16, 185, 129, 0.2);
  color: #86efac;
}

.status-empty {
  background: rgba(239, 68, 68, 0.2);
  color: #fecaca;
}


.chat-outer {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 60px);
  position: relative;
  z-index: 2;
}

.chat-container {
  flex: 1;
  overflow-y: auto;
  padding: 32px 0 100px 0;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.message-row {
  display: flex;
  width: 100%;
}

.bubble {
  max-width: 60%;
  padding: 16px 22px;
  border-radius: 18px;
  margin-bottom: 2px;
  font-size: 1.08em;
  box-shadow: 0 4px 24px 0 rgba(0,0,0,0.10);
  word-break: break-word;
}

.bubble.user {
  background: rgba(99,102,241,0.85);
  color: #fff;
  margin-left: auto;
  border-bottom-right-radius: 6px;
}
.bubble.ai {
  background: rgba(255,255,255,0.13);
  color: #e0e7ff;
  margin-right: auto;
  border-bottom-left-radius: 6px;
}

.bubble-sources {
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid rgba(255,255,255,0.2);
  font-size: 0.85em;
  color: #cbd5f5;
}

.input-bar {
  position: fixed;
  left: 0;
  bottom: 0;
  width: 100vw;
  background: rgba(30,41,59,0.85);
  backdrop-filter: blur(10px);
  z-index: 10;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 18px 0;
  border-top: 1.5px solid rgba(255,255,255,0.08);
}

.input-bar-inner {
  width: 100%;
  max-width: 700px;
  display: flex;
  gap: 12px;
}

.input-bar input {
  flex: 1;
  padding: 14px 18px;
  border-radius: 22px;
  border: none;
  outline: none;
  font-size: 1em;
  background: rgba(255,255,255,0.13);
  color: #fff;
  box-shadow: 0 2px 8px 0 rgba(0,0,0,0.08);
}

.input-bar button {
  padding: 0 28px;
  border-radius: 22px;
  border: none;
  background: #6366f1;
  color: white;
  font-weight: 500;
  font-size: 1em;
  cursor: pointer;
  transition: background 0.2s;
}

.input-bar button:disabled {
  background: #a5b4fc;
  cursor: not-allowed;
}

.main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(120deg, #2d133b 0%, #3a1c4a 50%, #1a0823 100%);
}

.chatbox{
background:rgba(58,28,74,0.98);
padding:40px;
border-radius:18px;
width:700px;
box-shadow:0 20px 40px 0 rgba(60,16,83,0.4);
border:1.5px solid #a259ec;
}

input{
width:80%;
padding:12px;
border-radius:8px;
border:1.5px solid #a259ec;
background:rgba(44,20,54,0.95);
color:#f3e8ff;
font-size:1.1em;
margin-bottom:10px;
transition:border 0.2s;
}
input:focus{
outline:none;
border:2px solid #d291fa;
}


@media (max-width: 700px) {
  .input-bar-inner { max-width: 98vw; }
  .bubble { max-width: 90vw; }
}


</style>

<script>

async function ask(){

let q=document.getElementById("query").value

document.getElementById("answer").innerText="Thinking..."

let res=await fetch("/ask",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({query:q})

})

let data=await res.json()

document.getElementById("answer").innerText=data.answer
document.getElementById("sources").innerText="Sources: "+data.sources.join(", ")

}

</script>

</head>
<body>
    <nav class="navbar">

    <div class="nav-brand">Enterprise Knowledge Assistant</div>
    
    <div class="nav-links">

      <span class="username">{{ username }}</span>
      
      {% if index_ready %}
        <span class="status-badge status-ready">Index Ready</span>
      {% else %}
        <span class="status-badge status-empty">No Docs Indexed</span>
      {% endif %}
      <a href="/">Home</a>
      <a href="/logout">Logout</a>


    </div>

  </nav>


    <div class="chat-outer">
        <div id="chat-container" class="chat-container">
      
            <div class="message-row">
                <div class="bubble ai">Hello! Ask me anything from your documents.</div>
            </div>
        </div>

        <form class="input-bar" id="chat-form" autocomplete="off" onsubmit="return false;">
        <div class="input-bar-inner">
            <input type="text" id="query" placeholder="Ask your question..." autocomplete="off" />
            <button id="send-btn" type="submit">Send</button>
      
        </div>

        </form>
    </div>







</body>
