<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="csrf-token" content="{{ csrf_token() }}">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* {
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  margin: 0;
  background: url("/static/images/ask.png") no-repeat center center/cover;
  position: relative;
  color: white;
  min-height: 100vh;
}

body::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(15,23,42,0.85);
  z-index: 0;
}

.navbar {
  position: relative;
  z-index: 2;
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
  background: rgba(30,41,59,0.7);
  backdrop-filter: blur(10px);
  border-bottom: 1.5px solid rgba(255,255,255,0.08);
}

.nav-brand {
  font-weight: 600;
  font-size: 1.2em;
}

.nav-links a,
.username {
  color: #e0e7ff;
  margin-left: 18px;
  text-decoration: none;
  font-weight: 500;
}

.status-badge {
  margin-left: 18px;
  padding: 5px 10px;
  border-radius: 999px;
  font-size: 0.8em;
  font-weight: 600;
  border: 1px solid rgba(255,255,255,0.2);
}

.status-ready {
  background: rgba(16, 185, 129, 0.2);
  color: #86efac;
}

.status-empty {
  background: rgba(239, 68, 68, 0.2);
  color: #fecaca;
}

.chat-outer {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 60px);
  position: relative;
  z-index: 2;
}

.chat-container {
  flex: 1;
  overflow-y: auto;
  padding: 32px 0 100px 0;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.message-row {
  display: flex;
  width: 100%;
}

.message-row.ai,
.message-row.ai-loading {
  flex-direction: column;
  align-items: flex-start;
}

.message-row.user {
  justify-content: flex-end;
}

.bubble {
  max-width: 60%;
  padding: 16px 22px;
  border-radius: 18px;
  margin-bottom: 2px;
  font-size: 1.08em;
  box-shadow: 0 4px 24px 0 rgba(0,0,0,0.10);
  word-break: break-word;
}

.bubble.user {
  background: rgba(99,102,241,0.85);
  color: #fff;
  margin-left: auto;
  border-bottom-right-radius: 6px;
}

.bubble.ai {
  background: rgba(255,255,255,0.13);
  color: #e0e7ff;
  margin-right: auto;
  border-bottom-left-radius: 6px;
}

.sources-box {
  margin-top: 10px;
  margin-left: 4px;
  padding: 12px 14px;
  border-radius: 12px;
  background: rgba(30, 41, 59, 0.6);
  border: 1px solid rgba(255,255,255,0.12);
  max-width: 60%;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
}

.sources-title {
  font-size: 0.85em;
  font-weight: 600;
  color: #c7d2fe;
  margin-bottom: 6px;
}

.sources-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.source-item {
  padding: 8px 10px;
  border-radius: 10px;
  background: rgba(15, 23, 42, 0.6);
  border: 1px solid rgba(255,255,255,0.08);
}

.source-doc {
  font-weight: 600;
  font-size: 0.9em;
  color: #e0e7ff;
}

.source-snippet {
  margin-top: 4px;
  font-size: 0.82em;
  color: #b6c2f5;
}

.input-bar {
  position: fixed;
  left: 0;
  bottom: 0;
  width: 100vw;
  background: rgba(30,41,59,0.85);
  backdrop-filter: blur(10px);
  z-index: 10;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 18px 0;
  border-top: 1.5px solid rgba(255,255,255,0.08);
}

.input-bar-inner {
  width: 100%;
  max-width: 700px;
  display: flex;
  gap: 12px;
}

.input-bar input {
  flex: 1;
  padding: 14px 18px;
  border-radius: 22px;
  border: none;
  outline: none;
  font-size: 1em;
  background: rgba(255,255,255,0.13);
  color: #fff;
  box-shadow: 0 2px 8px 0 rgba(0,0,0,0.08);
}

.input-bar button {
  padding: 0 28px;
  border-radius: 22px;
  border: none;
  background: #6366f1;
  color: white;
  font-weight: 500;
  font-size: 1em;
  cursor: pointer;
  transition: background 0.2s;
}

.input-bar button:disabled {
  background: #a5b4fc;
  cursor: not-allowed;
}

@media (max-width: 700px) {
  .input-bar-inner { max-width: 98vw; }
  .bubble { max-width: 90vw; }
  .sources-box { max-width: 90vw; }
}
</style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">Enterprise Knowledge Assistant</div>
    <div class="nav-links">
      <span class="username">{{ username }}</span>
      {% if index_ready %}
        <span class="status-badge status-ready">Index Ready</span>
      {% else %}
        <span class="status-badge status-empty">No Docs Indexed</span>
      {% endif %}
      <a href="/">Home</a>
      <a href="/logout">Logout</a>
    </div>
  </nav>

  <div class="chat-outer">
    <div id="chat-container" class="chat-container">
      <div class="message-row">
        <div class="bubble ai">Hello! Ask me anything from your documents.</div>
      </div>
    </div>
    <form class="input-bar" id="chat-form" autocomplete="off" onsubmit="return false;">
      <div class="input-bar-inner">
        <input type="text" id="query" placeholder="Ask your question..." autocomplete="off" />
        <button id="send-btn" type="submit">Send</button>
      </div>
    </form>
  </div>

  <script src="/static/chat.js"></script>
</body>
</html>
